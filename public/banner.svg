<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#12121a"/>
    </linearGradient>
    <linearGradient id="neonPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff1493"/>
      <stop offset="100%" style="stop-color:#b84dff"/>
    </linearGradient>
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#b84dff"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff1493"/>
      <stop offset="50%" style="stop-color:#b84dff"/>
      <stop offset="100%" style="stop-color:#00f0ff"/>
    </linearGradient>
    <linearGradient id="palmGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#b84dff"/>
      <stop offset="100%" style="stop-color:#00f0ff"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff1493" stop-opacity="0"/>
      <stop offset="30%" style="stop-color:#ff1493" stop-opacity="0.6"/>
      <stop offset="50%" style="stop-color:#b84dff" stop-opacity="0.6"/>
      <stop offset="70%" style="stop-color:#00f0ff" stop-opacity="0.6"/>
      <stop offset="100%" style="stop-color:#00f0ff" stop-opacity="0"/>
    </linearGradient>

    <filter id="glowPink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowLarge" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowBigText" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bgGrad)"/>
  <rect width="1500" height="500" fill="url(#grid)"/>

  <!-- Ambient glow spots -->
  <circle cx="200" cy="250" r="150" fill="#ff1493" opacity="0.06" filter="url(#glowLarge)"/>
  <circle cx="750" cy="250" r="180" fill="#b84dff" opacity="0.05" filter="url(#glowLarge)"/>
  <circle cx="1300" cy="250" r="150" fill="#00f0ff" opacity="0.06" filter="url(#glowLarge)"/>

  <!-- Animated gradient line -->
  <line x1="100" y1="380" x2="1400" y2="380" stroke="url(#lineGrad)" stroke-width="1.5"/>

  <!-- Top accent line -->
  <line x1="400" y1="120" x2="1100" y2="120" stroke="url(#lineGrad)" stroke-width="0.8"/>

  <!-- Palm tree (left side) -->
  <g transform="translate(80, 60) scale(2.2)">
    <path d="M80 170 Q78 140 82 110 Q84 90 86 70" stroke="url(#palmGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <g>
      <path d="M86 70 Q70 45 35 35" stroke="url(#neonCyan)" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#glowCyan)"/>
      <path d="M86 70 Q95 40 110 30" stroke="url(#neonCyan)" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#glowCyan)"/>
      <path d="M86 70 Q85 35 75 15" stroke="url(#neonCyan)" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#glowCyan)"/>
      <path d="M84 85 Q50 75 20 80" stroke="url(#neonPink)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M84 85 Q115 75 145 70" stroke="url(#neonPink)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Palm tree (right side) -->
  <g transform="translate(1130, 20) scale(2) scale(-1,1)">
    <path d="M80 170 Q78 140 82 110 Q84 90 86 70" stroke="url(#palmGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <g>
      <path d="M86 70 Q70 45 35 35" stroke="url(#neonPink)" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#glowPink)"/>
      <path d="M86 70 Q95 40 110 30" stroke="url(#neonPink)" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#glowPink)"/>
      <path d="M86 70 Q85 35 75 15" stroke="url(#neonPink)" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#glowPink)"/>
      <path d="M84 85 Q50 75 20 80" stroke="url(#neonCyan)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M84 85 Q115 75 145 70" stroke="url(#neonCyan)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Stars -->
  <g fill="#00f0ff" opacity="0.4">
    <circle cx="380" cy="180" r="1.5"/>
    <circle cx="1120" cy="160" r="1.5"/>
    <circle cx="480" cy="140" r="1"/>
    <circle cx="1020" cy="200" r="1"/>
    <circle cx="650" cy="130" r="1.2"/>
    <circle cx="850" cy="170" r="1.2"/>
    <circle cx="750" cy="100" r="1"/>
  </g>
  <g fill="#ff1493" opacity="0.3">
    <circle cx="420" cy="200" r="1"/>
    <circle cx="1080" cy="140" r="1.2"/>
    <circle cx="600" cy="160" r="0.8"/>
    <circle cx="900" cy="130" r="0.8"/>
  </g>

  <!-- Center content group -->
  <g transform="translate(0, -10)">
    <!-- GTA VI -->
    <text x="750" y="235" text-anchor="middle" font-family="'Poppins','Segoe UI',sans-serif" font-size="90" font-weight="900" fill="url(#textGrad)" letter-spacing="6" filter="url(#glowBigText)">
      GTA VI
    </text>

    <!-- hub -->
    <text x="750" y="290" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="38" font-weight="300" fill="#8888aa" letter-spacing="12" filter="url(#glowPink)">
      HUB
    </text>

    <!-- Tagline -->
    <text x="750" y="340" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="16" font-weight="400" fill="#666688" letter-spacing="4">
      COMMUNITY · GUIDES · MAPS · FORUMS
    </text>

    <!-- Website URL -->
    <text x="750" y="365" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="13" fill="#555577" letter-spacing="2">
      hubgta6.com
    </text>
  </g>

  <!-- Bottom decorative dots -->
  <circle cx="710" cy="420" r="4" fill="url(#neonPink)" filter="url(#glowPink)"/>
  <circle cx="750" cy="428" r="4" fill="url(#neonCyan)" filter="url(#glowCyan)"/>
  <circle cx="790" cy="420" r="4" fill="url(#neonPink)" filter="url(#glowPink)"/>
</svg>
