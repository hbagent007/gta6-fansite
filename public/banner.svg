<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#12121a"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff1493"/>
      <stop offset="35%" style="stop-color:#ff1493"/>
      <stop offset="65%" style="stop-color:#b84dff"/>
      <stop offset="100%" style="stop-color:#00f0ff"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff1493" stop-opacity="0"/>
      <stop offset="25%" style="stop-color:#ff1493" stop-opacity="0.5"/>
      <stop offset="50%" style="stop-color:#b84dff" stop-opacity="0.5"/>
      <stop offset="75%" style="stop-color:#00f0ff" stop-opacity="0.5"/>
      <stop offset="100%" style="stop-color:#00f0ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glowBig" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.015)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bgGrad)"/>
  <rect width="1500" height="500" fill="url(#grid)"/>

  <!-- Ambient glow spots -->
  <circle cx="200" cy="250" r="160" fill="#ff1493" opacity="0.05" filter="url(#glowBig)"/>
  <circle cx="750" cy="250" r="200" fill="#b84dff" opacity="0.04" filter="url(#glowBig)"/>
  <circle cx="1300" cy="250" r="160" fill="#00f0ff" opacity="0.05" filter="url(#glowBig)"/>

  <!-- Gradient lines -->
  <line x1="100" y1="385" x2="1400" y2="385" stroke="url(#lineGrad)" stroke-width="2"/>
  <line x1="300" y1="115" x2="1200" y2="115" stroke="url(#lineGrad)" stroke-width="1"/>

  <!-- GTA VI -->
  <text x="750" y="250" text-anchor="middle" font-family="Arial Black,Impact,Helvetica Neue,sans-serif" font-size="110" font-weight="900" fill="url(#textGrad)" letter-spacing="8" filter="url(#glowBig)">
    GTA VI
  </text>

  <!-- HUB -->
  <text x="750" y="305" text-anchor="middle" font-family="Arial Black,Impact,sans-serif" font-size="44" font-weight="bold" fill="#9999bb" letter-spacing="16" filter="url(#glow)">
    HUB
  </text>

  <!-- Tagline -->
  <text x="750" y="355" text-anchor="middle" font-family="Helvetica Neue,Arial,sans-serif" font-size="16" font-weight="400" fill="#666688" letter-spacing="5">
    COMMUNITY · GUIDES · MAPS · FORUMS
  </text>

  <!-- URL -->
  <text x="750" y="378" text-anchor="middle" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="300" fill="#555577" letter-spacing="3">
    hubgta6.com
  </text>

  <!-- Bottom dots -->
  <circle cx="710" cy="420" r="5" fill="#ff1493" opacity="0.8"/>
  <circle cx="750" cy="428" r="5" fill="#b84dff" opacity="0.8"/>
  <circle cx="790" cy="420" r="5" fill="#00f0ff" opacity="0.8"/>
</svg>
