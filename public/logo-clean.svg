<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#12121a"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff1493"/>
      <stop offset="40%" style="stop-color:#ff1493"/>
      <stop offset="70%" style="stop-color:#b84dff"/>
      <stop offset="100%" style="stop-color:#00f0ff"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff1493"/>
      <stop offset="50%" style="stop-color:#b84dff"/>
      <stop offset="100%" style="stop-color:#00f0ff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowBig" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="80" fill="url(#bgGrad)" stroke="rgba(255,20,147,0.15)" stroke-width="2"/>

  <!-- Ambient glow -->
  <circle cx="120" cy="120" r="100" fill="#ff1493" opacity="0.06" filter="url(#glowBig)"/>
  <circle cx="280" cy="280" r="100" fill="#00f0ff" opacity="0.06" filter="url(#glowBig)"/>

  <!-- GTA VI - Large, bold, clean -->
  <text x="200" y="210" text-anchor="middle" font-family="'Poppins','Segoe UI',sans-serif" font-size="64" font-weight="900" fill="url(#textGrad)" letter-spacing="4" filter="url(#glow)">
    GTA VI
  </text>

  <!-- hub - below, lighter -->
  <text x="200" y="260" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="34" font-weight="300" fill="#8888bb" letter-spacing="10" filter="url(#glow)">
    HUB
  </text>

  <!-- Accent line -->
  <line x1="140" y1="275" x2="260" y2="275" stroke="url(#accentLine)" stroke-width="1.5" opacity="0.6"/>

  <!-- Decorative dots -->
  <circle cx="170" cy="300" r="3" fill="#ff1493" opacity="0.8"/>
  <circle cx="200" cy="305" r="3" fill="#b84dff" opacity="0.8"/>
  <circle cx="230" cy="300" r="3" fill="#00f0ff" opacity="0.8"/>
</svg>
